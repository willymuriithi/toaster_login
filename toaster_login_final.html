<style>
	@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap');
	* {
		box-sizing: border-box;
		margin: 0;
		padding: 0;
	}
	.scene {
		display: flex;
		flex-direction: column;
		align-items: center;
		justify-content: center;
		background: linear-gradient(145deg, #f0a875 0%, #e8956a 50%, #f2b98a 100%);
		border-radius: 20px;
		min-height: 750px;
		font-family: 'Poppins', sans-serif;
		position: relative;
		overflow: hidden;
		padding: 30px 20px 50px;
	}
	.scene::after {
		content: '';
		position: absolute;
		inset: 0;
		background: radial-gradient(
			ellipse at 25% 15%,
			rgba(255, 230, 190, 0.45) 0%,
			transparent 55%
		);
		pointer-events: none;
	}
	.top-label {
		display: flex;
		gap: 32px;
		font-size: 13px;
		font-weight: 600;
		color: rgba(70, 30, 5, 0.5);
		margin-bottom: 4px;
		letter-spacing: 0.8px;
		z-index: 1;
	}
	.title {
		font-size: 34px;
		font-weight: 800;
		color: #1e0a00;
		letter-spacing: -1.2px;
		margin-bottom: 30px;
		z-index: 1;
		text-shadow: 0 2px 0 rgba(255, 255, 255, 0.25);
	}

	.toaster-wrap {
		position: relative;
		display: flex;
		flex-direction: column;
		align-items: center;
		z-index: 2;
		filter: drop-shadow(0 24px 48px rgba(80, 40, 5, 0.35));
	}

	/* ── CARD ── */
	.card {
		width: 230px;
		background: linear-gradient(160deg, #fef8e2 0%, #f8edb8 100%);
		border: 2.5px solid #cead6a;
		border-bottom: 2px solid #b89440;
		border-radius: 22px 22px 8px 8px;
		padding: 28px 22px 22px;
		position: relative;
		z-index: 6;
		transform: translateY(0);
		transition:
			transform 0.55s cubic-bezier(0.4, 0, 0.2, 1),
			box-shadow 0.4s;
		box-shadow:
			0 -6px 24px rgba(0, 0, 0, 0.1),
			inset 0 2px 0 rgba(255, 255, 255, 0.85);
	}
	.card::before {
		content: '';
		position: absolute;
		top: 10px;
		left: 12px;
		right: 12px;
		height: 44%;
		border-radius: 14px 14px 0 0;
		background: linear-gradient(
			to bottom,
			rgba(255, 255, 255, 0.5),
			transparent
		);
		pointer-events: none;
	}
	.card.sink {
		transform: translateY(110px);
		transition: transform 0.5s cubic-bezier(0.6, 0, 1, 0.5);
	}
	.card.pop {
		transform: translateY(-80px);
		transition: transform 0.55s cubic-bezier(0.18, 1.9, 0.36, 1);
		box-shadow: 0 28px 60px rgba(80, 40, 5, 0.28);
	}

	.card-title {
		font-size: 15px;
		font-weight: 700;
		text-align: center;
		color: #2a1200;
		margin-bottom: 18px;
		letter-spacing: 0.1px;
	}

	.field-label {
		font-size: 8.5px;
		font-weight: 600;
		color: #9a7a30;
		letter-spacing: 0.5px;
		text-transform: uppercase;
		margin-bottom: 4px;
		padding-left: 2px;
	}
	.input-wrap {
		position: relative;
		margin-bottom: 13px;
	}
	.input-icon {
		position: absolute;
		left: 12px;
		top: 50%;
		transform: translateY(-50%);
		width: 15px;
		height: 15px;
		opacity: 0.45;
		pointer-events: none;
	}
	.card input {
		width: 100%;
		border: 2px solid #d4b86a;
		border-radius: 10px;
		background: rgba(255, 255, 255, 0.9);
		font-family: 'Poppins', sans-serif;
		font-size: 12px;
		font-weight: 500;
		padding: 10px 12px 10px 34px;
		color: #2a1200;
		outline: none;
		transition:
			border-color 0.2s,
			box-shadow 0.2s,
			background 0.2s;
		letter-spacing: 0.1px;
	}
	.card input:focus {
		border-color: #9a7030;
		background: #fff;
		box-shadow: 0 0 0 3.5px rgba(154, 112, 48, 0.18);
	}
	.card input.error {
		border-color: #d03535;
		box-shadow: 0 0 0 3px rgba(208, 53, 53, 0.18);
		animation: shake 0.35s ease;
	}
	.card input::placeholder {
		color: #c0a555;
		font-size: 11px;
		font-weight: 400;
	}
	@keyframes shake {
		0%,
		100% {
			transform: translateX(0);
		}
		25% {
			transform: translateX(-6px);
		}
		75% {
			transform: translateX(6px);
		}
	}

	.divider {
		display: flex;
		align-items: center;
		gap: 8px;
		margin: 4px 0 6px;
	}
	.divider hr {
		flex: 1;
		border: none;
		border-top: 1px solid rgba(180, 150, 80, 0.3);
	}
	.divider span {
		font-size: 7.5px;
		font-weight: 600;
		color: #b8963a;
		letter-spacing: 0.4px;
		white-space: nowrap;
	}

	/* WELCOME */
	.welcome {
		display: none;
		flex-direction: column;
		align-items: center;
		gap: 5px;
		padding: 8px 0 2px;
	}
	.w-icon {
		font-size: 42px;
		animation: popIn 0.5s cubic-bezier(0.34, 1.6, 0.64, 1) both;
	}
	@keyframes popIn {
		from {
			transform: scale(0.2) rotate(-10deg);
			opacity: 0;
		}
		to {
			transform: scale(1) rotate(0);
			opacity: 1;
		}
	}
	.w-title {
		font-size: 18px;
		font-weight: 800;
		color: #1e0a00;
		letter-spacing: -0.5px;
		text-align: center;
		line-height: 1.2;
	}
	.w-sub {
		font-size: 8px;
		font-weight: 500;
		color: #9a7830;
		letter-spacing: 0.3px;
	}

	/* ── TOASTER BODY ── */
	.toaster-body {
		position: relative;
		z-index: 7;
		width: 320px;
		height: 120px;
		margin-top: -20px;
		border-radius: 16px 16px 0 0;
		background: linear-gradient(180deg, #9ad4ee 0%, #62b4d8 55%, #429ec8 100%);
		border: 3px solid #3a8cb8;
		border-bottom: none;
		box-shadow:
			inset 0 5px 14px rgba(255, 255, 255, 0.38),
			inset 5px 0 10px rgba(255, 255, 255, 0.12),
			inset -5px 0 10px rgba(0, 50, 90, 0.1),
			inset 0 -5px 10px rgba(0, 60, 110, 0.18);
		overflow: hidden;
	}
	.toaster-body::before {
		content: '';
		position: absolute;
		top: 0;
		left: 12%;
		width: 28%;
		height: 100%;
		background: linear-gradient(
			to right,
			rgba(255, 255, 255, 0),
			rgba(255, 255, 255, 0.2),
			rgba(255, 255, 255, 0)
		);
		border-radius: 50%;
		pointer-events: none;
	}
	.slots {
		display: flex;
		gap: 14px;
		margin: 16px auto 0;
		width: fit-content;
	}
	.slot {
		width: 62px;
		height: 14px;
		background: rgba(15, 60, 90, 0.55);
		border-radius: 7px;
		box-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.45);
	}
	.lever {
		position: absolute;
		right: 22px;
		top: 14px;
		display: flex;
		flex-direction: column;
		align-items: center;
		cursor: pointer;
		user-select: none;
	}
	.lever-head {
		width: 20px;
		height: 16px;
		background: linear-gradient(150deg, #f04545, #b01515);
		border-radius: 6px;
		border: 2px solid #8a0e0e;
		box-shadow:
			0 4px 8px rgba(0, 0, 0, 0.3),
			inset 0 1px 0 rgba(255, 130, 130, 0.45);
		transition: transform 0.25s cubic-bezier(0.34, 1.2, 0.64, 1);
	}
	.lever-rod {
		width: 5px;
		height: 58px;
		background: linear-gradient(to right, #555, #333, #555);
		border-radius: 3px;
		margin-top: 2px;
		box-shadow: 1px 0 3px rgba(0, 0, 0, 0.3);
	}
	.lever.pulled .lever-head {
		transform: translateY(22px);
	}

	/* ── BASE ── */
	.toaster-base {
		z-index: 8;
		width: 320px;
		background: linear-gradient(180deg, #42a0c8 0%, #2878a0 100%);
		border: 3px solid #3a8cb8;
		border-top: none;
		border-radius: 0 0 24px 24px;
		padding: 12px 20px 16px;
		box-shadow:
			0 14px 36px rgba(25, 70, 110, 0.4),
			inset 0 -3px 8px rgba(255, 255, 255, 0.1);
		display: flex;
		justify-content: space-between;
		align-items: center;
	}
	.vents {
		display: flex;
		flex-direction: column;
		gap: 5px;
	}
	.vent {
		height: 4px;
		border-radius: 2px;
		background: rgba(15, 55, 90, 0.4);
	}
	.vent:nth-child(1) {
		width: 30px;
	}
	.vent:nth-child(2) {
		width: 22px;
	}
	.vent:nth-child(3) {
		width: 26px;
	}
	.tray {
		width: 44px;
		height: 10px;
		background: linear-gradient(to bottom, #2060a0, #154878);
		border-radius: 5px;
		border: 1.5px solid #103860;
		box-shadow: inset 0 2px 3px rgba(0, 0, 0, 0.35);
	}
	.feet {
		display: flex;
		gap: 10px;
	}
	.foot {
		width: 12px;
		height: 8px;
		background: #1e5880;
		border-radius: 0 0 5px 5px;
		border: 1.5px solid #0e3858;
	}

	/* STEAM */
	.steam {
		position: absolute;
		top: -12px;
		left: 50%;
		transform: translateX(-50%);
		display: flex;
		gap: 18px;
		pointer-events: none;
		z-index: 10;
	}
	.sp {
		width: 10px;
		height: 10px;
		border-radius: 50%;
		background: rgba(255, 255, 255, 0.65);
		opacity: 0;
	}
	.sp.go {
		animation: puff 1.1s ease-out forwards;
	}
	.sp:nth-child(2) {
		animation-delay: 0.18s;
	}
	.sp:nth-child(3) {
		animation-delay: 0.34s;
	}
	@keyframes puff {
		0% {
			opacity: 0;
			transform: translateY(0) scale(1);
		}
		35% {
			opacity: 0.9;
		}
		100% {
			opacity: 0;
			transform: translateY(-36px) scale(3);
		}
	}

	.status {
		margin-top: 20px;
		font-size: 11.5px;
		font-weight: 600;
		height: 20px;
		text-align: center;
		letter-spacing: 0.2px;
		z-index: 1;
		transition: opacity 0.3s;
	}
	.status.ok {
		color: #1e5010;
	}
	.status.err {
		color: #b02020;
	}
</style>

<div class="scene">
	<div class="top-label"><span>Html</span><span>CSS</span><span>Js</span></div>
	<div class="title">Toaster Login</div>

	<div class="toaster-wrap">
		<div class="steam" id="steam">
			<div class="sp"></div>
			<div class="sp"></div>
			<div class="sp"></div>
		</div>

		<div class="card" id="card">
			<div id="loginView">
				<div class="card-title">Log In</div>

				<div class="field-label">Username</div>
				<div class="input-wrap">
					<svg
						class="input-icon"
						viewBox="0 0 24 24"
						fill="none"
						stroke="#8A6020"
						stroke-width="2.2">
						<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
						<circle cx="12" cy="7" r="4" />
					</svg>
					<input
						type="text"
						id="user"
						placeholder="Enter username"
						autocomplete="off" />
				</div>

				<div class="field-label">Password</div>
				<div class="input-wrap">
					<svg
						class="input-icon"
						viewBox="0 0 24 24"
						fill="none"
						stroke="#8A6020"
						stroke-width="2.2">
						<rect x="3" y="11" width="18" height="11" rx="2" />
						<path d="M7 11V7a5 5 0 0 1 10 0v4" />
					</svg>
					<input type="password" id="pass" placeholder="Enter password" />
				</div>

				<div class="divider">
					<hr />
					<span>pull lever to submit</span>
					<hr />
				</div>
			</div>

			<div class="welcome" id="welcomeView">
				<div class="w-icon">🍞</div>
				<div class="w-title">Welcome<br />Back!</div>
				<div class="w-sub">Successfully toasted ✓</div>
			</div>
		</div>

		<div class="toaster-body">
			<div class="slots">
				<div class="slot"></div>
				<div class="slot"></div>
			</div>
			<div class="lever" id="lever" onclick="pullLever()">
				<div class="lever-head"></div>
				<div class="lever-rod"></div>
			</div>
		</div>

		<div class="toaster-base">
			<div class="vents">
				<div class="vent"></div>
				<div class="vent"></div>
				<div class="vent"></div>
			</div>
			<div class="tray"></div>
			<div class="feet">
				<div class="foot"></div>
				<div class="foot"></div>
			</div>
		</div>
	</div>

	<p class="status" id="status"></p>
</div>

<script>
	const ctx = new (window.AudioContext || window.webkitAudioContext)();

	function playClick() {
		const g = ctx.createGain();
		g.gain.setValueAtTime(0.35, ctx.currentTime);
		g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.08);
		const o = ctx.createOscillator();
		o.type = 'square';
		o.frequency.setValueAtTime(180, ctx.currentTime);
		o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.08);
		o.connect(g);
		g.connect(ctx.destination);
		o.start();
		o.stop(ctx.currentTime + 0.09);
	}

	function playHum() {
		const g = ctx.createGain();
		g.gain.setValueAtTime(0, ctx.currentTime);
		g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + 0.1);
		g.gain.setValueAtTime(0.15, ctx.currentTime + 0.45);
		g.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.55);
		const o = ctx.createOscillator();
		o.type = 'sawtooth';
		o.frequency.setValueAtTime(60, ctx.currentTime);
		const f = ctx.createBiquadFilter();
		f.type = 'lowpass';
		f.frequency.value = 300;
		o.connect(f);
		f.connect(g);
		g.connect(ctx.destination);
		o.start();
		o.stop(ctx.currentTime + 0.6);
	}

	function playPop() {
		// toast pop sound
		const g = ctx.createGain();
		g.gain.setValueAtTime(0.5, ctx.currentTime);
		g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
		const o = ctx.createOscillator();
		o.type = 'sine';
		o.frequency.setValueAtTime(120, ctx.currentTime);
		o.frequency.exponentialRampToValueAtTime(480, ctx.currentTime + 0.08);
		o.frequency.exponentialRampToValueAtTime(260, ctx.currentTime + 0.35);
		o.connect(g);
		g.connect(ctx.destination);
		o.start();
		o.stop(ctx.currentTime + 0.36);
		// ding
		setTimeout(() => {
			const g2 = ctx.createGain();
			g2.gain.setValueAtTime(0.3, ctx.currentTime);
			g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
			const o2 = ctx.createOscillator();
			o2.type = 'sine';
			o2.frequency.setValueAtTime(880, ctx.currentTime);
			o2.frequency.setValueAtTime(1100, ctx.currentTime + 0.05);
			o2.connect(g2);
			g2.connect(ctx.destination);
			o2.start();
			o2.stop(ctx.currentTime + 0.65);
		}, 90);
	}

	function playError() {
		[0, 0.12].forEach((d) => {
			const g = ctx.createGain();
			g.gain.setValueAtTime(0.25, ctx.currentTime + d);
			g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + d + 0.1);
			const o = ctx.createOscillator();
			o.type = 'square';
			o.frequency.setValueAtTime(220, ctx.currentTime + d);
			o.connect(g);
			g.connect(ctx.destination);
			o.start(ctx.currentTime + d);
			o.stop(ctx.currentTime + d + 0.11);
		});
	}

	function triggerSteam() {
		document.querySelectorAll('.sp').forEach((p) => {
			p.classList.remove('go');
			void p.offsetWidth;
			p.classList.add('go');
		});
	}

	let busy = false;
	function pullLever() {
		if (busy) return;
		ctx.resume();
		const u = document.getElementById('user').value.trim();
		const p = document.getElementById('pass').value.trim();
		const card = document.getElementById('card');
		const lever = document.getElementById('lever');
		const status = document.getElementById('status');

		if (!u || !p) {
			playError();
			if (!u) {
				let e = document.getElementById('user');
				e.classList.add('error');
				setTimeout(() => e.classList.remove('error'), 450);
			}
			if (!p) {
				let e = document.getElementById('pass');
				e.classList.add('error');
				setTimeout(() => e.classList.remove('error'), 450);
			}
			status.textContent = '⚠ Fill in both fields first!';
			status.className = 'status err';
			lever.classList.add('pulled');
			setTimeout(() => lever.classList.remove('pulled'), 320);
			return;
		}

		busy = true;
		status.textContent = '';
		playClick();
		lever.classList.add('pulled');
		card.classList.add('sink');
		playHum();

		setTimeout(() => {
			document.getElementById('loginView').style.display = 'none';
			const wv = document.getElementById('welcomeView');
			wv.style.display = 'flex';
			const ic = wv.querySelector('.w-icon');
			ic.style.animation = 'none';
			void ic.offsetWidth;
			ic.style.animation = '';

			card.classList.remove('sink');
			setTimeout(() => {
				card.classList.add('pop');
				lever.classList.remove('pulled');
				playPop();
				triggerSteam();
				status.textContent = '✓ Logged in successfully!';
				status.className = 'status ok';

				setTimeout(() => {
					card.style.transition =
						'transform 0.65s cubic-bezier(0.25,0.46,0.45,0.94)';
					card.classList.remove('pop');
					setTimeout(() => {
						card.style.transition = '';
						document.getElementById('loginView').style.display = 'block';
						wv.style.display = 'none';
						document.getElementById('user').value = '';
						document.getElementById('pass').value = '';
						status.textContent = '';
						busy = false;
					}, 3000);
				}, 100);
			}, 90);
		}, 540);
	}

	document.getElementById('user').addEventListener('keydown', (e) => {
		if (e.key === 'Enter') document.getElementById('pass').focus();
	});
	document.getElementById('pass').addEventListener('keydown', (e) => {
		if (e.key === 'Enter') pullLever();
	});
</script>
